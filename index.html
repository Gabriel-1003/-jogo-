<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrida Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <div>🚗 <span id="vehicleType">Carro</span></div>
    <div>⚡ Velocidade: <span id="speed">0</span> km/h</div>
    <div>🏁 Volta: <span id="lap">0</span> / 3</div>
    <div>⏱️ Tempo: <span id="time">00:00.0</span></div>
    <button id="toggleVehicle">Trocar para Moto</button>
    <div id="controls">WASD ou Setas para controlar</div>
  </div>
  <script src="index.js"></script>
</body>
</html>
