<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corrida Realista Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="game"></canvas>
  <div id="overlay">
    <div id="hud">
      <div class="hud-top">
        <div class="hud-box"><span id="type">🚗 Carro</span></div>
        <div class="hud-box">⏱️ <span id="time">00:00.0</span></div>
        <div class="hud-box">🏁 <span id="lap">0</span>/3</div>
      </div>
      <div class="hud-mid">
        <div class="gauge">
          <div class="gauge-label">RPM</div>
          <div class="gauge-bar"><div id="rpmBar"></div></div>
          <div class="gauge-label">Marcha: <span id="gear">N</span></div>
        </div>
        <div class="gauge">
          <div class="gauge-label">Velocidade</div>
          <div class="speed-val"><span id="speed">0</span> <small>km/h</small></div>
        </div>
        <div class="gauge">
          <div class="gauge-label">Força G</div>
          <div class="gauge-bar"><div id="gBar"></div></div>
        </div>
      </div>
      <div class="hud-bottom">
        <button id="startBtn">🔑 LIGAR MOTOR</button>
        <div id="controls">WASD / Setas | Espaço = Freio de Mão</div>
      </div>
    </div>
  </div>
  <script src="index.js"></script>
</body>
</html>
